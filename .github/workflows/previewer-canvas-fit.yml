name: Previewer Canvas Fit

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  canvas-fit:
    name: Canvas fit & center (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Bun global store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}

      - name: Install JS dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-v1

      - name: Install Playwright (Python) + browser
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright Pillow
          if [ "${{ steps.cache-playwright.outputs.cache-hit }}" = "true" ]; then
            python -m playwright install-deps ${{ matrix.browser }}
          else
            python -m playwright install --with-deps ${{ matrix.browser }}
          fi

      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            .vinxi
            .output
            .tanstack
          key: ${{ runner.os }}-vite-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json', 'vite.config.*') }}-${{ hashFiles('src/**', 'app/**') }}
          restore-keys: |
            ${{ runner.os }}-vite-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json', 'vite.config.*') }}-
            ${{ runner.os }}-vite-

      - name: Build app
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Start dev server
        run: |
          bun run dev > /tmp/dev-server.log 2>&1 &
          echo $! > /tmp/dev-server.pid
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Wait for server (http://localhost:8080)
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8080 > /dev/null; then
              echo "Server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time"
          tail -n 200 /tmp/dev-server.log
          exit 1

      # DOM-bbox check: computes L/R and T/B gutters via
      # getBoundingClientRect() and fails when either axis drifts beyond
      # tolerance (CENTER_TOL=1.0px, EDGE_TOL=1.0px, cover fill≤1.5px).
      # Runs before the pixel diff so a real layout regression is
      # attributed to geometry, not to raster drift.
      - name: DOM gutter assertions (${{ matrix.browser }})
        id: dom_gutters
        env:
          BROWSER: ${{ matrix.browser }}
        run: python tests/mobile/previewer-canvas-fit.spec.py

      # Pixel diff runs even if the DOM step failed — surfacing BOTH
      # signals in one CI run makes it obvious whether a regression is
      # geometric, rasterisation-only, or both.
      - name: Visual diff vs baseline (${{ matrix.browser }})
        id: visual_diff
        if: always() && steps.dom_gutters.conclusion != 'skipped'
        env:
          BROWSER: ${{ matrix.browser }}
        run: python tests/mobile/previewer-visual-diff.spec.py


      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canvas-fit-${{ matrix.browser }}-artifacts
          path: |
            tests/mobile/screenshots/**
            tests/mobile/baselines/${{ matrix.browser }}/**
            /tmp/dev-server.log
          if-no-files-found: ignore


      - name: Stop dev server
        if: always()
        run: |
          if [ -f /tmp/dev-server.pid ]; then
            kill "$(cat /tmp/dev-server.pid)" || true
          fi
